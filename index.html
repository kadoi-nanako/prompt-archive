<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Archive — 生成イラスト・プロンプト管理</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { margin: 0; }

.archive-root {
  --bg: #FAF7F2;
  --bg-card: #FFFFFF;
  --bg-hover: #F5F1EA;
  --ink: #1A1816;
  --ink-2: #4A4540;
  --ink-3: #8A847E;
  --line: #E8E2D8;
  --line-strong: #D4CCBE;
  --accent: #C2410C;
  --accent-soft: #FFF1E8;
  --gold: #B89968;
  --display: 'Fraunces', Georgia, serif;
  --body: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', monospace;
  
  min-height: 100vh;
  background: var(--bg);
  background-image:
    radial-gradient(circle at 20% 0%, rgba(184, 153, 104, 0.05) 0%, transparent 50%),
    radial-gradient(circle at 80% 100%, rgba(194, 65, 12, 0.04) 0%, transparent 50%);
  color: var(--ink);
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.5;
  padding-bottom: 60px;
}

.archive-header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(250, 247, 242, 0.85);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.header-inner {
  max-width: 1400px; margin: 0 auto; padding: 18px 32px;
  display: flex; align-items: center; justify-content: space-between; gap: 24px;
}
.brand { display: flex; align-items: center; gap: 14px; }
.brand-mark {
  width: 38px; height: 38px; border-radius: 10px;
  background: var(--ink); color: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.brand-text h1 {
  font-family: var(--display); font-weight: 600;
  font-size: 22px; margin: 0; letter-spacing: -0.02em;
}
.brand-text p {
  font-size: 11px; color: var(--ink-3); margin: 0;
  letter-spacing: 0.05em; text-transform: uppercase;
}
.header-actions { display: flex; align-items: center; gap: 12px; }
.view-toggle {
  display: flex; background: var(--bg-card);
  border: 1px solid var(--line); border-radius: 8px; padding: 3px;
}
.view-toggle button {
  padding: 6px 12px; border: none; background: transparent;
  color: var(--ink-3); font-size: 12px; font-weight: 500;
  border-radius: 6px; cursor: pointer; display: flex;
  align-items: center; gap: 6px; transition: all 0.15s;
  font-family: var(--body);
}
.view-toggle button:hover { color: var(--ink); }
.view-toggle button.active { background: var(--ink); color: var(--bg); }

.btn-primary {
  background: var(--ink); color: var(--bg);
  border: 1px solid var(--ink); padding: 9px 16px;
  border-radius: 8px; font-weight: 500; font-size: 13px;
  cursor: pointer; display: inline-flex; align-items: center;
  gap: 6px; transition: all 0.15s; font-family: var(--body);
}
.btn-primary:hover {
  background: var(--accent); border-color: var(--accent);
  transform: translateY(-1px);
}
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-ghost {
  background: transparent; color: var(--ink-2);
  border: 1px solid var(--line); padding: 8px 14px;
  border-radius: 8px; font-weight: 500; font-size: 13px;
  cursor: pointer; font-family: var(--body); transition: all 0.15s;
}
.btn-ghost:hover { background: var(--bg-hover); border-color: var(--line-strong); }

.filter-bar { max-width: 1400px; margin: 0 auto; padding: 24px 32px 0; }
.filter-inner { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.search-box {
  flex: 1; min-width: 260px; position: relative;
  display: flex; align-items: center;
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 10px; padding: 0 12px; transition: all 0.15s;
}
.search-box:focus-within {
  border-color: var(--ink-2);
  box-shadow: 0 0 0 3px rgba(26, 24, 22, 0.05);
}
.search-box .icon { color: var(--ink-3); flex-shrink: 0; }
.search-box input {
  flex: 1; border: none; background: transparent;
  padding: 11px 8px; font-size: 13px; font-family: var(--body);
  color: var(--ink); outline: none;
}
.search-box input::placeholder { color: var(--ink-3); }
.clear-btn {
  background: transparent; border: none; color: var(--ink-3);
  cursor: pointer; padding: 4px; display: flex;
}

.tool-filters { display: flex; gap: 6px; flex-wrap: wrap; }
.tool-chip {
  padding: 7px 12px; border-radius: 999px;
  border: 1px solid; background: var(--bg-card);
  font-size: 12px; font-weight: 500; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px;
  transition: all 0.15s; font-family: var(--body);
}
.tool-chip .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.tool-chip.active .dot { background: white !important; }
.tool-chip:hover { transform: translateY(-1px); }

.fav-toggle {
  width: 38px; height: 38px; border-radius: 10px;
  border: 1px solid var(--line); background: var(--bg-card);
  color: var(--ink-3); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.fav-toggle:hover { color: var(--ink); }
.fav-toggle.active { background: var(--gold); border-color: var(--gold); color: white; }

.tag-bar {
  margin-top: 14px; display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap;
}
.tag-bar > .icon { color: var(--ink-3); flex-shrink: 0; }
.tag-list { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.tag-chip {
  padding: 5px 10px; border-radius: 6px;
  border: 1px solid var(--line); background: var(--bg-card);
  color: var(--ink-2); font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; font-family: var(--mono);
}
.tag-chip:hover { border-color: var(--ink); color: var(--ink); }
.tag-chip.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.tag-count { opacity: 0.6; margin-left: 4px; font-size: 10px; }
.clear-all {
  padding: 4px 8px; background: transparent; border: none;
  color: var(--accent); font-size: 11px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 3px;
  font-family: var(--body); font-weight: 500;
}

.archive-main { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }
.gallery-grid {
  display: grid; gap: 20px;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
}

.card {
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden; cursor: pointer;
  transition: all 0.2s; display: flex; flex-direction: column;
}
.card:hover {
  transform: translateY(-2px); border-color: var(--line-strong);
  box-shadow: 0 8px 24px -8px rgba(26, 24, 22, 0.12);
}
.card-img-wrap {
  position: relative; aspect-ratio: 4 / 3;
  background: linear-gradient(135deg, var(--bg-hover), var(--bg));
  overflow: hidden;
}
.card.compact .card-img-wrap { aspect-ratio: 1; }
.card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.4s;
}
.card:hover .card-img-wrap img { transform: scale(1.04); }
.card-noimg {
  width: 100%; height: 100%; display: flex;
  align-items: center; justify-content: center; color: var(--ink-3);
}
.card-overlay {
  position: absolute; top: 8px; right: 8px;
  display: flex; gap: 4px;
}
.fav-btn {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(6px);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-3); transition: all 0.15s; opacity: 0;
}
.card:hover .fav-btn { opacity: 1; }
.fav-btn.active { opacity: 1; background: var(--gold); color: white; }
.tool-badge {
  position: absolute; bottom: 8px; left: 8px;
  padding: 3px 8px; border-radius: 4px;
  font-size: 10px; font-weight: 600; color: white;
  letter-spacing: 0.02em;
}
.card-body {
  padding: 14px; flex: 1;
  display: flex; flex-direction: column; gap: 8px;
}
.card.compact .card-body { padding: 10px; gap: 6px; }
.card-title {
  font-family: var(--display); font-size: 15px; font-weight: 600;
  margin: 0; letter-spacing: -0.01em; color: var(--ink);
  display: -webkit-box; -webkit-line-clamp: 1;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card.compact .card-title { font-size: 13px; }
.card-prompt {
  font-size: 12px; color: var(--ink-2); margin: 0; line-height: 1.45;
  display: -webkit-box; -webkit-line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}
.card.compact .card-prompt { font-size: 11px; }
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: auto; }
.card-tag {
  font-family: var(--mono); font-size: 10px; color: var(--ink-3);
  background: var(--bg-hover); padding: 2px 6px; border-radius: 4px;
}
.card-tag-more { font-size: 10px; color: var(--ink-3); padding: 2px 4px; }

.compare-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px;
}
@media (max-width: 900px) { .compare-grid { grid-template-columns: 1fr; } }
.compare-column {
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 12px; overflow: hidden;
}
.compare-header {
  padding: 14px 16px; border-bottom: 2px solid;
  display: flex; align-items: center; gap: 10px;
}
.compare-header h3 {
  font-family: var(--display); font-size: 15px; font-weight: 600;
  margin: 0; flex: 1;
}
.compare-header .dot { width: 8px; height: 8px; border-radius: 50%; }
.count-pill {
  background: var(--bg-hover); padding: 2px 8px; border-radius: 999px;
  font-size: 11px; font-weight: 600; color: var(--ink-2);
}
.compare-items {
  padding: 12px; display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; max-height: 75vh; overflow-y: auto;
}
.compare-empty {
  grid-column: 1 / -1; padding: 40px 20px;
  text-align: center; color: var(--ink-3); font-size: 12px;
}

.empty-state { padding: 80px 20px; text-align: center; color: var(--ink-2); }
.empty-illust {
  width: 80px; height: 80px; border-radius: 50%;
  background: var(--bg-card); border: 1px dashed var(--line-strong);
  margin: 0 auto 20px; display: flex;
  align-items: center; justify-content: center; color: var(--ink-3);
}
.empty-state h2 {
  font-family: var(--display); font-size: 22px; font-weight: 600;
  margin: 0 0 8px; color: var(--ink);
}
.empty-state p { margin: 0 0 20px; font-size: 13px; }
.error-banner {
  max-width: 600px; margin: 0 auto; padding: 16px 20px;
  background: var(--accent-soft); border: 1px solid var(--accent);
  border-radius: 8px; color: var(--accent); font-size: 13px;
  text-align: left;
}
.error-banner strong { display: block; margin-bottom: 4px; }
.error-banner code {
  background: rgba(0,0,0,0.05); padding: 1px 5px;
  border-radius: 3px; font-size: 12px;
}

.result-count {
  margin-top: 24px; text-align: center; font-size: 11px;
  color: var(--ink-3); font-family: var(--mono); letter-spacing: 0.05em;
}

.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(26, 24, 22, 0.5); backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadeIn 0.15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--bg); border-radius: 16px;
  max-width: 720px; width: 100%; max-height: 90vh;
  display: flex; flex-direction: column; overflow: hidden;
  animation: slideUp 0.2s ease; border: 1px solid var(--line);
}
.detail-modal { max-width: 980px; }
@keyframes slideUp {
  from { transform: translateY(8px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.modal-head {
  padding: 18px 24px; border-bottom: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.modal-head h2 {
  font-family: var(--display); font-size: 18px; font-weight: 600;
  margin: 0; letter-spacing: -0.01em;
}
.modal-body { flex: 1; overflow-y: auto; padding: 24px; }
.modal-foot {
  padding: 14px 24px; border-top: 1px solid var(--line);
  display: flex; justify-content: flex-end; gap: 10px; background: var(--bg-card);
}
.icon-btn {
  background: transparent; border: 1px solid var(--line);
  color: var(--ink-2); height: 34px; padding: 0 10px;
  border-radius: 8px; cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 12px; transition: all 0.15s; font-family: var(--body); gap: 4px;
}
.icon-btn:hover {
  background: var(--bg-hover); color: var(--ink); border-color: var(--line-strong);
}
.icon-btn.danger:hover {
  color: #C2410C; border-color: #C2410C; background: var(--accent-soft);
}
.icon-btn.fav-active { background: var(--gold); border-color: var(--gold); color: white; }

.form-grid { display: flex; flex-direction: column; gap: 18px; }
.form-row { display: flex; flex-direction: column; gap: 6px; }
.form-row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-row label {
  font-size: 11px; font-weight: 600; color: var(--ink-2);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.form-row input, .form-row textarea {
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 8px; padding: 10px 12px; font-size: 13px;
  color: var(--ink); font-family: var(--body); outline: none;
  transition: all 0.15s; resize: vertical;
}
.form-row input:focus, .form-row textarea:focus {
  border-color: var(--ink-2);
  box-shadow: 0 0 0 3px rgba(26, 24, 22, 0.05);
}
.form-row textarea { font-family: var(--mono); font-size: 12px; line-height: 1.5; }

.image-drop {
  border: 2px dashed var(--line-strong); border-radius: 10px;
  padding: 24px; background: var(--bg-card); cursor: pointer;
  transition: all 0.15s; min-height: 160px;
  display: flex; align-items: center; justify-content: center;
}
.image-drop:hover { border-color: var(--ink-2); background: var(--bg-hover); }
.drop-state {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; color: var(--ink-3);
}
.drop-state span { font-size: 13px; font-weight: 500; color: var(--ink-2); }
.drop-state small { font-size: 11px; color: var(--ink-3); }
.preview-wrap { position: relative; width: 100%; }
.preview-wrap img {
  width: 100%; max-height: 280px; object-fit: contain; border-radius: 8px;
}
.remove-img {
  position: absolute; top: 6px; right: 6px;
  width: 26px; height: 26px; border-radius: 50%;
  background: rgba(26, 24, 22, 0.7); border: none; color: white;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.tool-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.tool-option {
  padding: 12px; border: 1px solid var(--line); border-radius: 8px;
  background: var(--bg-card); cursor: pointer;
  font-size: 12px; font-weight: 500; color: var(--ink-2);
  display: flex; align-items: center; gap: 6px;
  font-family: var(--body); transition: all 0.15s;
}
.tool-option:hover { background: var(--bg-hover); }
.tool-option.active { color: var(--ink); font-weight: 600; }
.tool-option .dot { width: 8px; height: 8px; border-radius: 50%; }

.tag-input-wrap { position: relative; }
.tag-pills {
  display: flex; flex-wrap: wrap; gap: 6px;
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 8px; padding: 8px;
  min-height: 42px; align-items: center;
}
.tag-pills:focus-within {
  border-color: var(--ink-2);
  box-shadow: 0 0 0 3px rgba(26, 24, 22, 0.05);
}
.tag-pills input {
  flex: 1; min-width: 120px;
  border: none !important; background: transparent !important;
  padding: 4px !important; outline: none; box-shadow: none !important;
}
.tag-pill {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--ink); color: var(--bg);
  padding: 3px 4px 3px 10px; border-radius: 6px;
  font-size: 11px; font-family: var(--mono);
}
.tag-pill button {
  background: rgba(255, 255, 255, 0.15); border: none;
  color: inherit; width: 16px; height: 16px;
  border-radius: 4px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.tag-suggest { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag-suggest button {
  background: var(--accent-soft); border: 1px solid transparent;
  color: var(--accent); font-family: var(--mono); font-size: 11px;
  padding: 3px 8px; border-radius: 4px; cursor: pointer;
}
.tag-suggest button:hover { border-color: var(--accent); }

.detail-title-row {
  display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0;
}
.detail-title-row .tool-badge { position: static; flex-shrink: 0; }
.detail-title-row h2 {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.title-edit {
  flex: 1; border: 1px solid var(--line); background: var(--bg-card);
  padding: 6px 10px; border-radius: 6px;
  font-family: var(--display); font-size: 16px; font-weight: 600; outline: none;
}
.detail-actions { display: flex; gap: 6px; flex-shrink: 0; }
.detail-body {
  display: grid; grid-template-columns: 1fr 1.2fr; gap: 24px; padding: 24px;
}
@media (max-width: 768px) { .detail-body { grid-template-columns: 1fr; } }
.detail-image {
  border-radius: 10px; overflow: hidden; background: var(--bg-hover);
  aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
}
.detail-image img { width: 100%; height: 100%; object-fit: contain; }
.detail-noimg {
  display: flex; flex-direction: column; align-items: center;
  gap: 8px; color: var(--ink-3); font-size: 12px;
}
.detail-info { display: flex; flex-direction: column; gap: 18px; }
.info-block { display: flex; flex-direction: column; gap: 6px; }
.info-head {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
}
.info-block h4 {
  font-size: 11px; font-weight: 600; color: var(--ink-2);
  margin: 0; letter-spacing: 0.05em; text-transform: uppercase;
}
.info-text {
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 8px; padding: 12px; margin: 0;
  font-family: var(--mono); font-size: 12px; line-height: 1.6;
  color: var(--ink); white-space: pre-wrap; word-break: break-word;
}
.info-text.muted { color: var(--ink-2); background: transparent; }
.copy-btn {
  background: transparent; border: 1px solid var(--line);
  border-radius: 6px; padding: 4px 10px; font-size: 11px;
  cursor: pointer; color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--body); font-weight: 500; transition: all 0.15s;
}
.copy-btn:hover {
  background: var(--ink); color: var(--bg); border-color: var(--ink);
}
.info-meta {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  padding: 14px; background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 8px;
}
.info-meta > div { display: flex; flex-direction: column; gap: 4px; }
.meta-label {
  font-size: 10px; font-weight: 600; color: var(--ink-3);
  letter-spacing: 0.05em; text-transform: uppercase;
}
.info-meta span:not(.meta-label) {
  font-family: var(--mono); font-size: 12px; color: var(--ink);
}
.info-meta input {
  background: var(--bg); border: 1px solid var(--line); border-radius: 4px;
  padding: 4px 8px; font-size: 12px; font-family: var(--mono); outline: none;
}
.muted { color: var(--ink-3); font-size: 12px; }

.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink); color: var(--bg);
  padding: 10px 18px; border-radius: 999px;
  font-size: 13px; font-weight: 500; z-index: 200;
  animation: toastIn 0.2s ease;
  box-shadow: 0 8px 24px -8px rgba(26, 24, 22, 0.3);
}
.toast-success { background: #1a5e3a; }
.toast-error { background: #8a2a1a; }
@keyframes toastIn {
  from { transform: translate(-50%, 8px); opacity: 0; }
  to { transform: translate(-50%, 0); opacity: 1; }
}

.loader {
  width: 32px; height: 32px;
  border: 2px solid var(--line); border-top-color: var(--ink);
  border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px;
}
.loader-sm {
  width: 20px; height: 20px;
  border: 2px solid var(--line); border-top-color: var(--ink);
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .header-inner { padding: 14px 16px; flex-wrap: wrap; }
  .filter-bar { padding: 16px 16px 0; }
  .archive-main { padding: 20px 16px; }
  .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .modal-body { padding: 16px; }
  .form-row-2col { grid-template-columns: 1fr; }
  .info-meta { grid-template-columns: 1fr; }
  .brand-text p { display: none; }
}

// Supabaseクライアント初期化
let db = null;
const isConfigured = SUPABASE_URL !== 'YOUR_SUPABASE_URL_HERE' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY';

// 画像圧縮
const compressImage = (file, maxWidth = 1600, quality = 0.85) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let width = img.width;
        let height = img.height;
        if (width > maxWidth) {
          height = (maxWidth / width) * height;
          width = maxWidth;
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

// ============== Main App ==============
function PromptArchive() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [searchQuery, setSearchQuery] = useState('');
  const [selectedTags, setSelectedTags] = useState([]);
  const [selectedTools, setSelectedTools] = useState([]);
  const [favoriteOnly, setFavoriteOnly] = useState(false);
  const [view, setView] = useState('gallery');
  const [detailItem, setDetailItem] = useState(null);
  const [showUpload, setShowUpload] = useState(false);
  const [toast, setToast] = useState(null);
  const [error, setError] = useState(null);

  // 初期ロード
  useEffect(() => {
    if (!isConfigured) {
      setError('config');
      setLoading(false);
      return;
    }
    loadItems();

    // リアルタイム同期 (他のユーザーの変更をリアルタイム反映)
    const channel = db
      .channel('illustrations-changes')
      .on('postgres_changes',
        { event: '*', schema: 'public', table: 'illustrations' },
        () => loadItems()
      )
      .subscribe();

    return () => {
      db.removeChannel(channel);
    };
  }, []);

  const loadItems = async () => {
    try {
      const { data, error } = await db
        .from('illustrations')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) throw error;
      setItems(data.map(normalizeItem));
    } catch (e) {
      console.error('Load error:', e);
      setError('load');
    } finally {
      setLoading(false);
    }
  };

  const normalizeItem = (row) => ({
    id: row.id,
    title: row.title || '',
    prompt: row.prompt || '',
    negativePrompt: row.negative_prompt || '',
    tool: row.tool,
    tags: row.tags || [],
    image: row.image_url || '',
    imagePath: row.image_path || '',
    model: row.model || '',
    seed: row.seed || '',
    notes: row.notes || '',
    favorite: row.favorite || false,
    createdAt: new Date(row.created_at).getTime(),
    updatedAt: new Date(row.updated_at).getTime(),
  });

  const showToast = (msg, type = 'info') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2200);
  };

  const uploadImage = async (blob) => {
    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.jpg`;
    const { data, error } = await db.storage
      .from('images')
      .upload(fileName, blob, { contentType: 'image/jpeg', cacheControl: '3600' });
    if (error) throw error;
    const { data: urlData } = db.storage.from('images').getPublicUrl(data.path);
    return { url: urlData.publicUrl, path: data.path };
  };

  const createItem = async (form) => {
    try {
      let imageUrl = '';
      let imagePath = '';
      if (form.imageBlob) {
        const uploaded = await uploadImage(form.imageBlob);
        imageUrl = uploaded.url;
        imagePath = uploaded.path;
      }
      const { error } = await db.from('illustrations').insert({
        title: form.title,
        prompt: form.prompt,
        negative_prompt: form.negativePrompt,
        tool: form.tool,
        tags: form.tags,
        image_url: imageUrl,
        image_path: imagePath,
        model: form.model,
        seed: form.seed,
        notes: form.notes,
      });
      if (error) throw error;
      showToast('保存しました', 'success');
      await loadItems();
    } catch (e) {
      console.error(e);
      showToast('保存に失敗しました: ' + e.message, 'error');
      throw e;
    }
  };

  const updateItem = async (item, newImageBlob = null) => {
    try {
      let updates = {
        title: item.title,
        prompt: item.prompt,
        negative_prompt: item.negativePrompt,
        tool: item.tool,
        tags: item.tags,
        model: item.model,
        seed: item.seed,
        notes: item.notes,
        favorite: item.favorite,
        updated_at: new Date().toISOString(),
      };
      if (newImageBlob) {
        // 古い画像削除
        if (item.imagePath) {
          await db.storage.from('images').remove([item.imagePath]);
        }
        const uploaded = await uploadImage(newImageBlob);
        updates.image_url = uploaded.url;
        updates.image_path = uploaded.path;
      }
      const { error } = await db
        .from('illustrations')
        .update(updates)
        .eq('id', item.id);
      if (error) throw error;
      showToast('更新しました', 'success');
      await loadItems();
    } catch (e) {
      console.error(e);
      showToast('更新に失敗しました', 'error');
    }
  };

  const deleteItem = async (item) => {
    if (!confirm('この項目を削除しますか？')) return;
    try {
      if (item.imagePath) {
        await db.storage.from('images').remove([item.imagePath]);
      }
      const { error } = await db
        .from('illustrations').delete().eq('id', item.id);
      if (error) throw error;
      setDetailItem(null);
      showToast('削除しました', 'success');
      await loadItems();
    } catch (e) {
      console.error(e);
      showToast('削除に失敗しました', 'error');
    }
  };

  const toggleFavorite = async (item) => {
    const updated = { ...item, favorite: !item.favorite };
    await updateItem(updated);
    if (detailItem && detailItem.id === item.id) setDetailItem(updated);
  };

  const allTags = useMemo(() => {
    const map = new Map();
    items.forEach((i) =>
      (i.tags || []).forEach((t) => map.set(t, (map.get(t) || 0) + 1))
    );
    return Array.from(map.entries()).sort((a, b) => b[1] - a[1]);
  }, [items]);

  const filtered = useMemo(() => {
    const q = searchQuery.trim().toLowerCase();
    return items.filter((it) => {
      if (favoriteOnly && !it.favorite) return false;
      if (selectedTools.length > 0 && !selectedTools.includes(it.tool)) return false;
      if (selectedTags.length > 0 && !selectedTags.every((t) => (it.tags || []).includes(t))) return false;
      if (q) {
        const hay = [it.title, it.prompt, it.negativePrompt, it.notes, (it.tags || []).join(' ')]
          .filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
  }, [items, searchQuery, selectedTags, selectedTools, favoriteOnly]);

  const byTool = useMemo(() => {
    const result = {};
    TOOLS.forEach((t) => (result[t.id] = []));
    filtered.forEach((it) => { if (result[it.tool]) result[it.tool].push(it); });
    return result;
  }, [filtered]);

  const clearFilters = () => {
    setSearchQuery(''); setSelectedTags([]);
    setSelectedTools([]); setFavoriteOnly(false);
  };

  const hasActiveFilter = searchQuery || selectedTags.length > 0 || selectedTools.length > 0 || favoriteOnly;

  if (error === 'config') {
    return (
      <div className="archive-root">
        <div className="empty-state" style={{ paddingTop: 100 }}>
          <div className="empty-illust"><Icon name="sparkles" size={36} /></div>
          <h2>セットアップが必要です</h2>
          <p style={{ marginBottom: 20 }}>HTMLファイル内のSupabase設定が未入力です。</p>
          <div className="error-banner">
            <strong>📝 必要な設定</strong>
            HTMLファイル内の以下2行を、Supabaseダッシュボードから取得した値に変更してください:
            <br /><br />
            <code>SUPABASE_URL</code> = あなたのプロジェクトURL<br />
            <code>SUPABASE_ANON_KEY</code> = anon publicキー<br /><br />
            詳細は <code>SETUP.md</code> を参照してください。
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="archive-root">
      <header className="archive-header">
        <div className="header-inner">
          <div className="brand">
            <div className="brand-mark"><Icon name="sparkles" size={18} /></div>
            <div className="brand-text">
              <h1>Prompt Archive</h1>
              <p>生成イラスト・プロンプト管理</p>
            </div>
          </div>
          <div className="header-actions">
            <div className="view-toggle">
              <button className={view === 'gallery' ? 'active' : ''} onClick={() => setView('gallery')}>
                <Icon name="grid" size={15} /><span>Gallery</span>
              </button>
              <button className={view === 'compare' ? 'active' : ''} onClick={() => setView('compare')}>
                <Icon name="columns" size={15} /><span>Compare</span>
              </button>
            </div>
            <button className="btn-primary" onClick={() => setShowUpload(true)}>
              <Icon name="plus" size={16} />新規追加
            </button>
          </div>
        </div>
      </header>

      <section className="filter-bar">
        <div className="filter-inner">
          <div className="search-box">
            <Icon name="search" size={16} />
            <input type="text" placeholder="プロンプト・タイトル・タグから検索..."
              value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
            {searchQuery && (
              <button className="clear-btn" onClick={() => setSearchQuery('')}>
                <Icon name="x" size={14} />
              </button>
            )}
          </div>
          <div className="tool-filters">
            {TOOLS.map((t) => {
              const active = selectedTools.includes(t.id);
              return (
                <button key={t.id} className={`tool-chip ${active ? 'active' : ''}`}
                  onClick={() => setSelectedTools((prev) =>
                    prev.includes(t.id) ? prev.filter((x) => x !== t.id) : [...prev, t.id])}
                  style={active ? { background: t.color, borderColor: t.color, color: '#fff' }
                    : { borderColor: t.color, color: t.color }}>
                  <span className="dot" style={{ background: t.color }} />{t.name}
                </button>
              );
            })}
          </div>
          <button className={`fav-toggle ${favoriteOnly ? 'active' : ''}`}
            onClick={() => setFavoriteOnly((v) => !v)} title="お気に入りのみ">
            <Icon name="star" size={15} fill={favoriteOnly ? 'currentColor' : 'none'} />
          </button>
        </div>

        {allTags.length > 0 && (
          <div className="tag-bar">
            <Icon name="tag" size={13} />
            <div className="tag-list">
              {allTags.map(([tag, count]) => {
                const active = selectedTags.includes(tag);
                return (
                  <button key={tag} className={`tag-chip ${active ? 'active' : ''}`}
                    onClick={() => setSelectedTags((prev) =>
                      prev.includes(tag) ? prev.filter((x) => x !== tag) : [...prev, tag])}>
                    #{tag} <span className="tag-count">{count}</span>
                  </button>
                );
              })}
            </div>
            {hasActiveFilter && (
              <button className="clear-all" onClick={clearFilters}>
                <Icon name="x" size={12} /> クリア
              </button>
            )}
          </div>
        )}
      </section>

      <main className="archive-main">
        {loading ? (
          <div className="empty-state"><div className="loader" /><p>読み込み中...</p></div>
        ) : error === 'load' ? (
          <div className="empty-state">
            <p>データの読み込みに失敗しました</p>
            <div className="error-banner" style={{ marginTop: 16 }}>
              Supabaseの設定とテーブル作成を確認してください。<br />
              詳細はブラウザのコンソール (F12) を参照。
            </div>
          </div>
        ) : items.length === 0 ? (
          <div className="empty-state">
            <div className="empty-illust"><Icon name="image" size={48} /></div>
            <h2>アーカイブはまだ空です</h2>
            <p>「新規追加」から最初のイラストとプロンプトを登録しましょう</p>
            <button className="btn-primary" onClick={() => setShowUpload(true)}>
              <Icon name="plus" size={16} /> はじめての登録
            </button>
          </div>
        ) : filtered.length === 0 ? (
          <div className="empty-state">
            <p>条件に合う項目が見つかりません</p>
            <button className="btn-ghost" onClick={clearFilters}>フィルタをクリア</button>
          </div>
        ) : view === 'gallery' ? (
          <GalleryView items={filtered} onSelect={setDetailItem} onToggleFav={toggleFavorite} />
        ) : (
          <CompareView byTool={byTool} onSelect={setDetailItem} onToggleFav={toggleFavorite} />
        )}

        <div className="result-count">
          {!loading && items.length > 0 && (
            <span>{filtered.length} / {items.length} 件</span>
          )}
        </div>
      </main>

      {showUpload && (
        <UploadModal
          onClose={() => setShowUpload(false)}
          onSave={async (form) => { await createItem(form); setShowUpload(false); }}
          existingTags={allTags.map((t) => t[0])}
        />
      )}

      {detailItem && (
        <DetailModal
          item={detailItem}
          onClose={() => setDetailItem(null)}
          onDelete={() => deleteItem(detailItem)}
          onToggleFav={() => toggleFavorite(detailItem)}
          onUpdate={async (updated, newBlob) => {
            await updateItem(updated, newBlob);
            setDetailItem(updated);
          }}
          existingTags={allTags.map((t) => t[0])}
          showToast={showToast}
        />
      )}

      {toast && <div className={`toast toast-${toast.type}`}>{toast.msg}</div>}
    </div>
  );
}

function GalleryView({ items, onSelect, onToggleFav }) {
  return (
    <div className="gallery-grid">
      {items.map((it) => (
        <Card key={it.id} item={it}
          onClick={() => onSelect(it)} onToggleFav={() => onToggleFav(it)} />
      ))}
    </div>
  );
}

function CompareView({ byTool, onSelect, onToggleFav }) {
  return (
    <div className="compare-grid">
      {TOOLS.map((tool) => (
        <div key={tool.id} className="compare-column">
          <div className="compare-header" style={{ borderColor: tool.color }}>
            <span className="dot" style={{ background: tool.color }} />
            <h3>{tool.name}</h3>
            <span className="count-pill">{byTool[tool.id].length}</span>
          </div>
          <div className="compare-items">
            {byTool[tool.id].length === 0 ? (
              <div className="compare-empty">該当なし</div>
            ) : (
              byTool[tool.id].map((it) => (
                <Card key={it.id} item={it} compact
                  onClick={() => onSelect(it)} onToggleFav={() => onToggleFav(it)} />
              ))
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

function Card({ item, onClick, onToggleFav, compact }) {
  const tool = TOOLS.find((t) => t.id === item.tool) || TOOLS[0];
  return (
    <article className={`card ${compact ? 'compact' : ''}`} onClick={onClick}>
      <div className="card-img-wrap">
        {item.image ? (
          <img src={item.image} alt={item.title} loading="lazy" />
        ) : (
          <div className="card-noimg"><Icon name="image" size={28} /></div>
        )}
        <div className="card-overlay">
          <button className={`fav-btn ${item.favorite ? 'active' : ''}`}
            onClick={(e) => { e.stopPropagation(); onToggleFav(); }}>
            <Icon name="star" size={14} fill={item.favorite ? 'currentColor' : 'none'} />
          </button>
        </div>
        <div className="tool-badge" style={{ background: tool.color }}>{tool.name}</div>
      </div>
      <div className="card-body">
        <h3 className="card-title">{item.title || '無題'}</h3>
        <p className="card-prompt">{item.prompt}</p>
        {item.tags && item.tags.length > 0 && (
          <div className="card-tags">
            {item.tags.slice(0, 4).map((t) => (
              <span key={t} className="card-tag">#{t}</span>
            ))}
            {item.tags.length > 4 && <span className="card-tag-more">+{item.tags.length - 4}</span>}
          </div>
        )}
      </div>
    </article>
  );
}

function UploadModal({ onClose, onSave, existingTags }) {
  const [title, setTitle] = useState('');
  const [prompt, setPrompt] = useState('');
  const [negativePrompt, setNegativePrompt] = useState('');
  const [tool, setTool] = useState(TOOLS[0].id);
  const [tags, setTags] = useState([]);
  const [tagInput, setTagInput] = useState('');
  const [imageBlob, setImageBlob] = useState(null);
  const [imagePreview, setImagePreview] = useState(null);
  const [model, setModel] = useState('');
  const [seed, setSeed] = useState('');
  const [notes, setNotes] = useState('');
  const [processing, setProcessing] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const fileRef = useRef(null);

  const handleFile = async (file) => {
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      alert('画像ファイルを選択してください');
      return;
    }
    setProcessing(true);
    try {
      const blob = await compressImage(file, 1600, 0.85);
      setImageBlob(blob);
      setImagePreview(URL.createObjectURL(blob));
    } catch (e) {
      console.error(e);
      alert('画像の処理に失敗しました');
    } finally {
      setProcessing(false);
    }
  };

  const addTag = (t) => {
    const trimmed = t.trim().replace(/^#/, '');
    if (trimmed && !tags.includes(trimmed)) setTags([...tags, trimmed]);
    setTagInput('');
  };

  const handleTagKey = (e) => {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault(); addTag(tagInput);
    } else if (e.key === 'Backspace' && !tagInput && tags.length > 0) {
      setTags(tags.slice(0, -1));
    }
  };

  const handleSubmit = async () => {
    if (!prompt.trim()) { alert('プロンプトは必須です'); return; }
    setSubmitting(true);
    try {
      await onSave({
        title: title.trim(),
        prompt: prompt.trim(),
        negativePrompt: negativePrompt.trim(),
        tool, tags,
        imageBlob,
        model: model.trim(),
        seed: seed.trim(),
        notes: notes.trim(),
      });
    } catch (e) {
      // 保存失敗時はモーダルを閉じない
    } finally {
      setSubmitting(false);
    }
  };

  const suggestedTags = existingTags.filter(
    (t) => t.toLowerCase().includes(tagInput.toLowerCase()) && !tags.includes(t) && tagInput
  ).slice(0, 6);

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal upload-modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <h2>新規追加</h2>
          <button className="icon-btn" onClick={onClose}>
            <Icon name="x" size={18} />
          </button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-row">
              <label>画像</label>
              <div className="image-drop" onClick={() => fileRef.current?.click()}
                onDragOver={(e) => e.preventDefault()}
                onDrop={(e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); }}>
                {processing ? (
                  <div className="drop-state"><div className="loader-sm" /><span>処理中...</span></div>
                ) : imagePreview ? (
                  <div className="preview-wrap">
                    <img src={imagePreview} alt="preview" />
                    <button className="remove-img"
                      onClick={(e) => { e.stopPropagation(); setImagePreview(null); setImageBlob(null); }}>
                      <Icon name="x" size={14} />
                    </button>
                  </div>
                ) : (
                  <div className="drop-state">
                    <Icon name="upload" size={28} />
                    <span>クリックまたはドラッグ&ドロップ</span>
                    <small>自動で圧縮されます (最大1600px)</small>
                  </div>
                )}
                <input ref={fileRef} type="file" accept="image/*" hidden
                  onChange={(e) => handleFile(e.target.files[0])} />
              </div>
            </div>

            <div className="form-row">
              <label>生成ツール *</label>
              <div className="tool-select">
                {TOOLS.map((t) => (
                  <button key={t.id} className={`tool-option ${tool === t.id ? 'active' : ''}`}
                    onClick={() => setTool(t.id)}
                    style={tool === t.id ? { borderColor: t.color, background: t.accent } : {}}>
                    <span className="dot" style={{ background: t.color }} />{t.name}
                  </button>
                ))}
              </div>
            </div>

            <div className="form-row">
              <label>タイトル</label>
              <input type="text" value={title} onChange={(e) => setTitle(e.target.value)}
                placeholder="例: 夏の風景イラスト" />
            </div>

            <div className="form-row">
              <label>プロンプト *</label>
              <textarea value={prompt} onChange={(e) => setPrompt(e.target.value)}
                placeholder="生成に使ったプロンプトを入力..." rows={4} />
            </div>

            <div className="form-row">
              <label>ネガティブプロンプト</label>
              <textarea value={negativePrompt} onChange={(e) => setNegativePrompt(e.target.value)}
                placeholder="(任意) 除外したい要素..." rows={2} />
            </div>

            <div className="form-row">
              <label>タグ</label>
              <div className="tag-input-wrap">
                <div className="tag-pills">
                  {tags.map((t) => (
                    <span key={t} className="tag-pill">
                      #{t}
                      <button onClick={() => setTags(tags.filter((x) => x !== t))}>
                        <Icon name="x" size={10} />
                      </button>
                    </span>
                  ))}
                  <input type="text" value={tagInput}
                    onChange={(e) => setTagInput(e.target.value)} onKeyDown={handleTagKey}
                    placeholder={tags.length === 0 ? 'タグを入力してEnter' : ''} />
                </div>
                {suggestedTags.length > 0 && (
                  <div className="tag-suggest">
                    {suggestedTags.map((t) => (
                      <button key={t} onClick={() => addTag(t)}>#{t}</button>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="form-row-2col">
              <div className="form-row">
                <label>モデル</label>
                <input type="text" value={model} onChange={(e) => setModel(e.target.value)}
                  placeholder="(任意) v1.5 など" />
              </div>
              <div className="form-row">
                <label>シード</label>
                <input type="text" value={seed} onChange={(e) => setSeed(e.target.value)}
                  placeholder="(任意)" />
              </div>
            </div>

            <div className="form-row">
              <label>メモ</label>
              <textarea value={notes} onChange={(e) => setNotes(e.target.value)}
                placeholder="(任意) 工夫した点、注意点など..." rows={2} />
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn-ghost" onClick={onClose} disabled={submitting}>キャンセル</button>
          <button className="btn-primary" onClick={handleSubmit} disabled={processing || submitting}>
            {submitting ? '保存中...' : '保存'}
          </button>
        </div>
      </div>
    </div>
  );
}

function DetailModal({ item, onClose, onDelete, onToggleFav, onUpdate, existingTags, showToast }) {
  const [editing, setEditing] = useState(false);
  const [edited, setEdited] = useState(item);
  const [tagInput, setTagInput] = useState('');
  const [copiedField, setCopiedField] = useState(null);
  const [newImageBlob, setNewImageBlob] = useState(null);
  const [newImagePreview, setNewImagePreview] = useState(null);
  const [saving, setSaving] = useState(false);
  const editFileRef = useRef(null);
  const tool = TOOLS.find((t) => t.id === item.tool) || TOOLS[0];

  useEffect(() => {
    setEdited(item);
    setNewImageBlob(null); setNewImagePreview(null);
  }, [item]);

  const copy = async (text, field) => {
    try {
      await navigator.clipboard.writeText(text);
      setCopiedField(field);
      setTimeout(() => setCopiedField(null), 1400);
      showToast('コピーしました', 'success');
    } catch (e) { console.error(e); }
  };

  const handleEditFile = async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    try {
      const blob = await compressImage(file, 1600, 0.85);
      setNewImageBlob(blob);
      setNewImagePreview(URL.createObjectURL(blob));
    } catch (e) { console.error(e); }
  };

  const handleSave = async () => {
    setSaving(true);
    try {
      await onUpdate(edited, newImageBlob);
      setEditing(false);
      setNewImageBlob(null); setNewImagePreview(null);
    } finally {
      setSaving(false);
    }
  };

  const addTag = (t) => {
    const trimmed = t.trim().replace(/^#/, '');
    if (trimmed && !(edited.tags || []).includes(trimmed)) {
      setEdited({ ...edited, tags: [...(edited.tags || []), trimmed] });
    }
    setTagInput('');
  };

  return (
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal detail-modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-head">
          <div className="detail-title-row">
            <span className="tool-badge" style={{ background: tool.color }}>{tool.name}</span>
            {editing ? (
              <input className="title-edit" value={edited.title}
                onChange={(e) => setEdited({ ...edited, title: e.target.value })}
                placeholder="タイトル" />
            ) : (
              <h2>{item.title || '無題'}</h2>
            )}
          </div>
          <div className="detail-actions">
            <button className={`icon-btn ${item.favorite ? 'fav-active' : ''}`}
              onClick={onToggleFav} title="お気に入り">
              <Icon name="star" size={16} fill={item.favorite ? 'currentColor' : 'none'} />
            </button>
            {!editing && (
              <button className="icon-btn" onClick={() => setEditing(true)}>編集</button>
            )}
            <button className="icon-btn danger" onClick={onDelete}>
              <Icon name="trash" size={16} />
            </button>
            <button className="icon-btn" onClick={onClose}>
              <Icon name="x" size={18} />
            </button>
          </div>
        </div>
        <div className="modal-body detail-body">
          <div>
            <div className="detail-image">
              {(newImagePreview || item.image) ? (
                <img src={newImagePreview || item.image} alt={item.title} />
              ) : (
                <div className="detail-noimg">
                  <Icon name="image" size={48} /><span>画像なし</span>
                </div>
              )}
            </div>
            {editing && (
              <button className="btn-ghost" style={{ marginTop: 8, width: '100%' }}
                onClick={() => editFileRef.current?.click()}>
                <Icon name="upload" size={14} /> 画像を変更
                <input ref={editFileRef} type="file" accept="image/*" hidden
                  onChange={(e) => handleEditFile(e.target.files[0])} />
              </button>
            )}
          </div>

          <div className="detail-info">
            <div className="info-block">
              <div className="info-head">
                <h4>プロンプト</h4>
                {!editing && (
                  <button className="copy-btn" onClick={() => copy(item.prompt, 'prompt')}>
                    {copiedField === 'prompt' ? (
                      <><Icon name="check" size={13} /> コピー済</>
                    ) : (
                      <><Icon name="copy" size={13} /> コピー</>
                    )}
                  </button>
                )}
              </div>
              {editing ? (
                <textarea value={edited.prompt}
                  onChange={(e) => setEdited({ ...edited, prompt: e.target.value })} rows={5} />
              ) : (
                <p className="info-text">{item.prompt}</p>
              )}
            </div>

            {(item.negativePrompt || editing) && (
              <div className="info-block">
                <div className="info-head">
                  <h4>ネガティブプロンプト</h4>
                  {item.negativePrompt && !editing && (
                    <button className="copy-btn" onClick={() => copy(item.negativePrompt, 'neg')}>
                      {copiedField === 'neg' ? (
                        <><Icon name="check" size={13} /> コピー済</>
                      ) : (
                        <><Icon name="copy" size={13} /> コピー</>
                      )}
                    </button>
                  )}
                </div>
                {editing ? (
                  <textarea value={edited.negativePrompt || ''}
                    onChange={(e) => setEdited({ ...edited, negativePrompt: e.target.value })}
                    rows={2} placeholder="(任意)" />
                ) : (
                  <p className="info-text muted">{item.negativePrompt}</p>
                )}
              </div>
            )}

            <div className="info-block">
              <h4>タグ</h4>
              {editing ? (
                <div className="tag-pills">
                  {(edited.tags || []).map((t) => (
                    <span key={t} className="tag-pill">
                      #{t}
                      <button onClick={() => setEdited({ ...edited, tags: edited.tags.filter((x) => x !== t) })}>
                        <Icon name="x" size={10} />
                      </button>
                    </span>
                  ))}
                  <input type="text" value={tagInput}
                    onChange={(e) => setTagInput(e.target.value)}
                    onKeyDown={(e) => {
                      if (e.key === 'Enter' || e.key === ',') {
                        e.preventDefault(); addTag(tagInput);
                      }
                    }} placeholder="タグを追加..." />
                </div>
              ) : (
                <div className="card-tags">
                  {(item.tags || []).length === 0 ? <span className="muted">なし</span> : (
                    item.tags.map((t) => <span key={t} className="card-tag">#{t}</span>)
                  )}
                </div>
              )}
            </div>

            <div className="info-meta">
              <div>
                <span className="meta-label">モデル</span>
                {editing ? (
                  <input type="text" value={edited.model || ''}
                    onChange={(e) => setEdited({ ...edited, model: e.target.value })} />
                ) : (<span>{item.model || '—'}</span>)}
              </div>
              <div>
                <span className="meta-label">シード</span>
                {editing ? (
                  <input type="text" value={edited.seed || ''}
                    onChange={(e) => setEdited({ ...edited, seed: e.target.value })} />
                ) : (<span>{item.seed || '—'}</span>)}
              </div>
              <div>
                <span className="meta-label">登録日</span>
                <span>{new Date(item.createdAt).toLocaleDateString('ja-JP')}</span>
              </div>
            </div>

            {(item.notes || editing) && (
              <div className="info-block">
                <h4>メモ</h4>
                {editing ? (
                  <textarea value={edited.notes || ''}
                    onChange={(e) => setEdited({ ...edited, notes: e.target.value })}
                    rows={3} placeholder="(任意)" />
                ) : (
                  <p className="info-text muted">{item.notes}</p>
                )}
              </div>
            )}
          </div>
        </div>
        {editing && (
          <div className="modal-foot">
            <button className="btn-ghost" disabled={saving}
              onClick={() => {
                setEdited(item); setEditing(false);
                setNewImageBlob(null); setNewImagePreview(null);
              }}>キャンセル</button>
            <button className="btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? '保存中...' : '保存'}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<PromptArchive />);
</script>
</body>
</html>
